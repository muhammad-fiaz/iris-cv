name: 🐛 Bug Report
description: File a report to help us improve the library
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Code snippet or steps to reproduce the issue.
      placeholder: |
        ```rust
        // Your code here
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Operating System, Rust version, Burn backend, etc.
      placeholder: |
        - OS: Windows/Linux/macOS
        - Rust version: 1.85.0
        - Backend: WGPU / Ndarray
    validations:
      required: true
